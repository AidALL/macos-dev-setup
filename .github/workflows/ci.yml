name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Check zsh syntax
        run: zsh -n install-dev-environment.sh

      - name: Check default zsh dry-run plan
        run: zsh install-dev-environment.sh --yes --dry-run

      - name: Check executable dry-run plan
        run: ./install-dev-environment.sh --yes --dry-run

      - name: Check bash compatibility shim
        run: bash install-dev-environment.sh --yes --dry-run

      - name: Check zsh dry-run with empty PATH
        run: PATH= /bin/zsh install-dev-environment.sh --yes --dry-run

      - name: Check bash compatibility shim with empty PATH
        run: PATH= /bin/bash install-dev-environment.sh --yes --dry-run
