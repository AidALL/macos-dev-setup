name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n install-dev-environment.sh

      - name: Check dry-run plan
        run: bash install-dev-environment.sh --yes --dry-run
