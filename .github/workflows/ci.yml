name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh expect

      - name: Check zsh syntax
        run: zsh -n install-dev-environment.sh

      - name: Check default zsh dry-run plan
        run: zsh install-dev-environment.sh --yes --dry-run

      - name: Check executable dry-run plan
        run: ./install-dev-environment.sh --yes --dry-run

      - name: Check bash compatibility shim
        run: bash install-dev-environment.sh --yes --dry-run

      - name: Check zsh dry-run with empty PATH
        run: PATH= /bin/zsh install-dev-environment.sh --yes --dry-run

      - name: Check bash compatibility shim with empty PATH
        run: PATH= /bin/bash install-dev-environment.sh --yes --dry-run

      - name: Check PATH repair in backup helpers
        run: PATH=/opt/homebrew/bin /bin/zsh install-dev-environment.sh --self-test-path-repair

      - name: Check generated zshrc template
        run: /bin/zsh install-dev-environment.sh --self-test-zshrc-template

      - name: Check interactive Android decline
        run: |
          expect <<'EXPECT' | tee /tmp/macos-dev-setup-interactive.log
          set timeout 10
          spawn zsh install-dev-environment.sh --dry-run
          expect "Install every development profile?"
          send "n\r"
          expect "Install recommended default profiles?"
          send "y\r"
          expect "Install iOS helpers?"
          send "n\r"
          expect "Install Android helpers?"
          send "n\r"
          expect "nfd2nfc를 설치하고 상주 감시 기능을 켜는 데 동의하십니까?"
          send "y\r"
          expect eof
          EXPECT
          grep -q "android:   no" /tmp/macos-dev-setup-interactive.log
          ! grep -q "android-studio" /tmp/macos-dev-setup-interactive.log
          ! grep -q "android-platform-tools" /tmp/macos-dev-setup-interactive.log
